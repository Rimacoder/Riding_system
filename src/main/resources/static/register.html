<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Smart Ride</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrap card">
    <h2>Create Account</h2>
    <div class="grid">
      <input id="name" placeholder="Full name" />
      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <input id="phone" placeholder="Phone" />
      <select id="role">
        <option value="PASSENGER">Passenger</option>
        <option value="DRIVER">Driver</option>
      </select>
      <input id="vehicleModel" placeholder="Vehicle model (driver only)" />
      <input id="licensePlate" placeholder="License plate (driver only)" />
      <input id="vehicleCapacity" type="number" placeholder="Vehicle capacity (driver only)" />
      <button onclick="registerUser()">Register</button>
      <a href="/login.html">Already have account? Login</a>
      <p id="registerMsg" class="msg"></p>
    </div>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
