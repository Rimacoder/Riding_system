spring:
  datasource:
    url: jdbc:h2:mem:ridesharingdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

app:
  jwt:
    secret: 0123456789abcdef0123456789abcdef
    expiration-ms: 86400000
